<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="dist/popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Collapse</h1>

      <div id="collapse-section" class="card">
        <div class="scope-toggle">
          <button id="scope-selected" class="scope-btn active" type="button">
            Selected
            <span id="scope-selected-count" class="scope-count">0</span>
          </button>
          <button id="scope-all" class="scope-btn" type="button">
            All Tabs <span id="scope-all-count" class="scope-count">0</span>
          </button>
        </div>
        <button id="collapse-btn" class="btn-primary" type="button" disabled>
          Create List
        </button>
      </div>

      <div id="lists-section" class="card" style="display: none">
        <h2>Saved Lists</h2>
        <div id="lists-container"></div>
      </div>

      <div class="footer">
        <p>v<span id="version-display"></span></p>
      </div>
    </div>
    <script src="dist/popup.js"></script>
  </body>
</html>
