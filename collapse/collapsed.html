<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Collapsed Videos</title>
    <link rel="stylesheet" href="collapsed.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-left">
          <h1 id="list-name" contenteditable="true" spellcheck="false"></h1>
          <span id="video-count" class="video-count"></span>
        </div>
        <div class="header-actions">
          <button id="merge-btn" class="btn btn-secondary">Merge List</button>
          <button id="delete-list-btn" class="btn btn-danger">
            Delete List
          </button>
        </div>
      </header>

      <div id="videos" class="video-list"></div>

      <div id="empty-state" class="empty-state" style="display: none">
        <p>No videos in this list.</p>
      </div>

      <!-- Merge modal -->
      <div id="merge-modal" class="modal-overlay" style="display: none">
        <div class="modal">
          <h2>Merge Another List</h2>
          <p>Select a list to merge into this one:</p>
          <div id="merge-list-options" class="merge-options"></div>
          <div class="modal-actions">
            <button id="merge-cancel" class="btn btn-secondary">Cancel</button>
          </div>
        </div>
      </div>
    </div>
    <script src="collapsed.js"></script>
  </body>
</html>
