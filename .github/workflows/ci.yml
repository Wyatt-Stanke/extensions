name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  check:
    name: Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check types
        run: npm run test:type
      - name: Lint and format check
        run: npm run test:lint
      - name: Build
        run: npm run build
