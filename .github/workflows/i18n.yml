name: i18n
on:
  push:
    branches: [ main ]
    paths:
      - '**/_locales/**'
      - '**/i18n-status/**'
      - 'scripts/i18n/**'
  pull_request:
    paths:
      - '**/_locales/**'
      - '**/i18n-status/**'
      - 'scripts/i18n/**'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Validate i18n
        run: npm run i18n:validate
      
      - name: Generate badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run i18n:badge
        
      - name: Commit badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/i18n-status.svg
          git diff-index --quiet HEAD || git commit -m "chore(i18n): update translation badge" && git push
