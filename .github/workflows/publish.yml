name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to republish (e.g. collapse-v1.2.3)"
        required: true
        type: string
      skip_publish:
        description: "Skip uploading to the Chrome Web Store"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check if Chrome Web Store upload should be skipped
        id: skip_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # workflow_dispatch: honour the explicit input flag
          if [[ "${{ inputs.skip_publish }}" == "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Chrome Web Store upload (skip_publish input is true)"
            exit 0
          fi

          TAG="${{ github.event.release.tag_name }}"
          if [[ -z "$TAG" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_SHA=$(git rev-list -n 1 "$TAG")
          REPO="${{ github.repository }}"

          PR_NUMBER=$(gh api "repos/$REPO/commits/$COMMIT_SHA/pulls" \
            --header "Accept: application/vnd.github+json" \
            --jq '.[0].number // empty')

          if [[ -n "$PR_NUMBER" ]]; then
            echo "Found associated PR #$PR_NUMBER"
            HAS_LABEL=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels \
              --jq '[.labels[].name] | contains(["autorelease: skip CWS publish"])')
            if [[ "$HAS_LABEL" == "true" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Skipping Chrome Web Store upload due to 'autorelease: skip CWS publish' label on PR #$PR_NUMBER"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No associated PR found, proceeding with upload"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine extension from release tag
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [[ "$TAG" == *-v* ]]; then
            EXTENSION="${TAG%-v*}"
            VERSION="${TAG##*-v}"
          else
            echo "::error::Tag '$TAG' missing component prefix (expected format: <extension>-v<version>)"
            exit 1
          fi
          echo "extension=$EXTENSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read extension ID
        id: extid
        run: |
          EXTENSION_ID=$(jq -r '.extensionId // ""' "${{ steps.meta.outputs.extension }}/info.json")
          echo "id=$EXTENSION_ID" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create ZIP
        run: |
          cd "${{ steps.meta.outputs.extension }}"
          zip -r "../${{ steps.meta.outputs.extension }}.zip" . \
            -x "info.json" \
            -x "version.txt" \
            -x "CHANGELOG.md" \
            -x "icon.svg"

      - name: Attach ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name || inputs.tag }}" \
            --clobber \
            "${{ steps.meta.outputs.extension }}.zip"

      - name: Upload and submit for review
        if: ${{ steps.extid.outputs.id != '' && steps.skip_check.outputs.skip != 'true' }}
        run: |
          npx chrome-webstore-upload-cli upload \
            --source "${{ steps.meta.outputs.extension }}.zip" \
            --extension-id "${{ steps.extid.outputs.id }}" \
            --auto-publish
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
