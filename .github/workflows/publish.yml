name: Publish Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine extension from release tag
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == *-v* ]]; then
            EXTENSION="${TAG%-v*}"
            VERSION="${TAG##*-v}"
          else
            echo "::error::Tag '$TAG' missing component prefix (expected format: <extension>-v<version>)"
            exit 1
          fi
          echo "extension=$EXTENSION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read extension ID
        id: extid
        run: |
          EXTENSION_ID=$(jq -r '.extensionId // ""' "${{ steps.meta.outputs.extension }}/info.json")
          echo "id=$EXTENSION_ID" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create ZIP
        run: |
          cd "${{ steps.meta.outputs.extension }}"
          zip -r "../${{ steps.meta.outputs.extension }}.zip" . \
            -x "info.json" \
            -x "version.txt" \
            -x "CHANGELOG.md" \
            -x "icon.svg"

      - name: Attach ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.meta.outputs.extension }}.zip"

      - name: Upload and submit for review
        if: ${{ steps.extid.outputs.id != '' }}
        run: |
          npx chrome-webstore-upload-cli upload \
            --source "${{ steps.meta.outputs.extension }}.zip" \
            --extension-id "${{ steps.extid.outputs.id }}" \
            --auto-publish
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
